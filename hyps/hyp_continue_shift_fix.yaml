# Focus on reducing mask shift for curves/bars
amp: False
optimizer: AdamW
lr0: 0.0025
lrf: 0.10
cos_lr: true
warmup_epochs: 3.0
patience: 80

# Key fixes
rect: true
mosaic: 0.0
close_mosaic: 0
mixup: 0.0
copy_paste: 0.0

# Keep geometry stable
degrees: 0.0
shear: 0.0
perspective: 0.0
translate: 0.02
scale: 0.20
fliplr: 0.0
flipud: 0.0

# Mild color jitter only
hsv_h: 0.005
hsv_s: 0.12
hsv_v: 0.12

# Loss balance
box: 7.0
cls: 0.7
dfl: 1.8
