# Curriculum Stage 2 (medium-easy): introduce basic bars/annotations.
# Use with: digitizer train --hyp-yaml runs/curriculum_stage2.yml --execute

model: yolo11s-seg.pt
imgsz: 704
batch: 8
epochs: 50

optimizer: AdamW
lr0: 0.0028
lrf: 0.18
cos_lr: true
warmup_epochs: 4.0
patience: 60

mosaic: 0.0
close_mosaic: 0
mixup: 0.0
copy_paste: 0.0
fliplr: 0.0
flipud: 0.0
scale: 0.18
translate: 0.02
degrees: 0.0
shear: 0.0
perspective: 0.0003
hsv_h: 0.004
hsv_s: 0.10
hsv_v: 0.10

box: 6.2
cls: 0.6
dfl: 1.6

