# Curriculum Stage 4 (hard): dense curves, legend, strong degradations.
# Use with: digitizer train --hyp-yaml runs/curriculum_stage4.yml --execute

model: yolo11s-seg.pt
imgsz: 832
batch: 6
epochs: 90

optimizer: AdamW
lr0: 0.0030
lrf: 0.12
cos_lr: true
warmup_epochs: 5.0
patience: 80

mosaic: 0.0
close_mosaic: 0
mixup: 0.0
copy_paste: 0.0
fliplr: 0.0
flipud: 0.0
scale: 0.35
translate: 0.03
degrees: 0.0
shear: 0.0
perspective: 0.0007
hsv_h: 0.006
hsv_s: 0.18
hsv_v: 0.18

box: 6.7
cls: 0.75
dfl: 1.8

