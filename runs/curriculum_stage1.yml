# Curriculum Stage 1 (easy): learn clean/simple curves first.
# Use with: digitizer train --hyp-yaml runs/curriculum_stage1.yml --execute

model: yolo11s-seg.pt
imgsz: 640
batch: 8
epochs: 40

optimizer: AdamW
lr0: 0.0025
lrf: 0.20
cos_lr: true
warmup_epochs: 3.0
patience: 50

# Keep augmentation light in stage 1.
mosaic: 0.0
close_mosaic: 0
mixup: 0.0
copy_paste: 0.0
fliplr: 0.0
flipud: 0.0
scale: 0.10
translate: 0.01
degrees: 0.0
shear: 0.0
perspective: 0.0
hsv_h: 0.002
hsv_s: 0.05
hsv_v: 0.05

box: 6.0
cls: 0.5
dfl: 1.5

