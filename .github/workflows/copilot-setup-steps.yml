name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            extra-experimental-features = nix-command flakes

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Verify Nix is available
        run: |
          nix --version
          nix flake --help >/dev/null

      - name: Prefetch flake-utils input
        run: nix flake prefetch github:numtide/flake-utils/11707dc2f618dd54ca8739b309ec4fc024de578b >/dev/null
